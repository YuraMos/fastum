<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fastum</title>
<style>
:root{--bg:#faf8f2;--fg:#1f2937;--muted:#5b6472;--accent:#7C3AED;--card:#fff;--line:#e7e1d5}
@media(prefers-color-scheme:dark){:root{--bg:#0c1220;--fg:#e9edf5;--muted:#93a0b4;--accent:#A855F7;--card:#131b2b;--line:#26303f}}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.card{max-width:440px;margin:24px;padding:36px 30px;text-align:center}
.brand{font-weight:800;font-size:34px;letter-spacing:-.02em}
.brand span{color:var(--accent)}
p{color:var(--muted);line-height:1.6;margin:12px 0 26px}
.links{display:flex;flex-direction:column;gap:12px}
.links a{display:block;padding:14px 18px;border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--fg);text-decoration:none;font-weight:600}
.links a:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Fast<span>um</span></div>
  <p>The calm intermittent-fasting tracker. This page hosts Fastum's policies and support.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Use</a>
    <a href="support.html">Support</a>
  </div>
</div>
</body>
</html>
